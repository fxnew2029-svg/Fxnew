<!DOCTYPE html>
<html>
<head>
  <title>FXTrade Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #050816, #0b1a2a);
      color: white;
    }

    /* Top bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #071426;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .logo span {
      color: #1dd1a1;
    }

    .menu {
      font-size: 22px;
    }

    /* Center login */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 85vh;
    }

    .login-box {
      background: rgba(10, 20, 40, 0.9);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: none;
      border-radius: 8px;
      background: #0f2a44;
      color: white;
    }

    .login-box input::placeholder {
      color: #aaa;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #1dd1a1;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .login-box button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">FX<span>Trade</span></div>
    <div class="menu">☰</div>
  </div>

  <!-- LOGIN -->
<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error" style="color:red; font-size:12px; display:none;">Invalid login details</p>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // Fake login credentials
  if (user === "luna" && pass === "luna1234") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
